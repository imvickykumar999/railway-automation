<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Railway Deployment Config{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-red: #dc3545;
            --dark-red: #b02a37;
            --darker-red: #8b1e2a;
            --black: #000000;
            --dark-gray: #1a1a1a;
            --medium-gray: #2d2d2d;
            --light-gray: #3a3a3a;
            --text-light: #f5f5f5;
            --text-muted: #b0b0b0;
        }
        
        body {
            background: linear-gradient(135deg, #000000 0%, #1a0000 50%, #000000 100%);
            color: var(--text-light);
            padding-top: 20px;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
        
        .container {
            max-width: 900px;
        }
        
        /* Navbar Styling */
        .navbar {
            background: linear-gradient(135deg, #000000 0%, #1a0000 100%) !important;
            border-bottom: 2px solid var(--primary-red);
            box-shadow: 0 4px 6px rgba(220, 53, 69, 0.3);
        }
        
        .navbar-brand {
            color: var(--primary-red) !important;
            font-weight: 700;
            font-size: 1.3rem;
            text-shadow: 0 0 10px rgba(220, 53, 69, 0.5);
        }
        
        .navbar-brand:hover {
            color: #ff4757 !important;
            text-shadow: 0 0 15px rgba(255, 71, 87, 0.8);
        }
        
        .nav-link {
            color: var(--text-light) !important;
            font-weight: 500;
            margin: 0 5px;
            padding: 8px 15px !important;
            border-radius: 5px;
            transition: all 0.3s ease;
        }
        
        .nav-link:hover {
            background-color: var(--primary-red);
            color: #fff !important;
            transform: translateY(-2px);
        }
        
        /* Card Styling */
        .card {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            border: 1px solid var(--primary-red);
            border-radius: 10px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5), 0 0 20px rgba(220, 53, 69, 0.1);
            margin-bottom: 20px;
            color: var(--text-light);
        }
        
        .card-header {
            background: linear-gradient(135deg, #000000 0%, #1a0000 100%);
            border-bottom: 2px solid var(--primary-red);
            color: var(--text-light);
            font-weight: 600;
            padding: 15px 20px;
        }
        
        .card-body {
            background: transparent;
            color: var(--text-light);
        }
        
        /* Form Styling */
        .form-control {
            background-color: var(--dark-gray);
            border: 1px solid var(--light-gray);
            color: var(--text-light);
            border-radius: 5px;
        }
        
        .form-control:focus {
            background-color: var(--medium-gray);
            border-color: var(--primary-red);
            color: var(--text-light);
            box-shadow: 0 0 0 0.2rem rgba(220, 53, 69, 0.25);
        }
        
        .form-control::placeholder {
            color: var(--text-muted);
        }
        
        .form-label {
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-light);
        }
        
        .help-text {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-top: 5px;
        }
        
        .help-text a {
            color: var(--primary-red);
            text-decoration: none;
        }
        
        .help-text a:hover {
            color: #ff4757;
            text-decoration: underline;
        }
        
        /* Button Styling */
        .btn-primary {
            background: linear-gradient(135deg, var(--primary-red) 0%, var(--dark-red) 100%);
            border: none;
            color: #fff;
            font-weight: 600;
            box-shadow: 0 4px 6px rgba(220, 53, 69, 0.3);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, #ff4757 0%, var(--primary-red) 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(220, 53, 69, 0.4);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #28a745 0%, #1e7e34 100%);
            border: none;
            color: #fff;
            font-weight: 600;
            box-shadow: 0 4px 6px rgba(40, 167, 69, 0.3);
        }
        
        .btn-success:hover {
            background: linear-gradient(135deg, #34ce57 0%, #28a745 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(40, 167, 69, 0.4);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, var(--primary-red) 0%, var(--darker-red) 100%);
            border: none;
            color: #fff;
            font-weight: 600;
            box-shadow: 0 4px 6px rgba(220, 53, 69, 0.3);
        }
        
        .btn-danger:hover {
            background: linear-gradient(135deg, #ff4757 0%, var(--primary-red) 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(220, 53, 69, 0.4);
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, var(--medium-gray) 0%, var(--dark-gray) 100%);
            border: 1px solid var(--light-gray);
            color: var(--text-light);
            font-weight: 600;
        }
        
        .btn-secondary:hover {
            background: linear-gradient(135deg, var(--light-gray) 0%, var(--medium-gray) 100%);
            border-color: var(--primary-red);
            color: #fff;
        }
        
        .btn-outline-primary, .btn-outline-secondary, .btn-outline-danger {
            border-color: var(--primary-red);
            color: var(--primary-red);
        }
        
        .btn-outline-primary:hover, .btn-outline-secondary:hover, .btn-outline-danger:hover {
            background-color: var(--primary-red);
            border-color: var(--primary-red);
            color: #fff;
        }
        
        /* Alert Styling */
        .alert {
            border-radius: 8px;
            border: none;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        
        .alert-success {
            background: linear-gradient(135deg, rgba(40, 167, 69, 0.2) 0%, rgba(40, 167, 69, 0.1) 100%);
            border-left: 4px solid #28a745;
            color: #90ee90;
        }
        
        .alert-danger {
            background: linear-gradient(135deg, rgba(220, 53, 69, 0.2) 0%, rgba(220, 53, 69, 0.1) 100%);
            border-left: 4px solid var(--primary-red);
            color: #ff6b7a;
        }
        
        .alert-warning {
            background: linear-gradient(135deg, rgba(255, 193, 7, 0.2) 0%, rgba(255, 193, 7, 0.1) 100%);
            border-left: 4px solid #ffc107;
            color: #ffd700;
        }
        
        /* Badge Styling */
        .badge {
            padding: 6px 12px;
            font-weight: 600;
        }
        
        .badge.bg-success {
            background: linear-gradient(135deg, #28a745 0%, #1e7e34 100%) !important;
        }
        
        .badge.bg-secondary {
            background: linear-gradient(135deg, var(--medium-gray) 0%, var(--dark-gray) 100%) !important;
        }
        
        /* Code/Pre Styling */
        code {
            background-color: var(--black);
            color: var(--primary-red);
            padding: 2px 6px;
            border-radius: 3px;
            border: 1px solid var(--primary-red);
        }
        
        /* Definition List Styling */
        dt {
            color: var(--text-muted);
            font-weight: 600;
        }
        
        dd {
            color: var(--text-light);
        }
        
        /* Link Styling */
        a {
            color: var(--primary-red);
        }
        
        a:hover {
            color: #ff4757;
        }
        
        .btn-link {
            color: var(--primary-red);
            text-decoration: none;
        }
        
        .btn-link:hover {
            color: #ff4757;
        }
        
        /* Select Dropdown Styling */
        select.form-control {
            background-color: var(--dark-gray);
            border: 1px solid var(--light-gray);
            color: var(--text-light);
        }
        
        select.form-control:focus {
            background-color: var(--medium-gray);
            border-color: var(--primary-red);
            color: var(--text-light);
        }
        
        option {
            background-color: var(--dark-gray);
            color: var(--text-light);
        }
        
        /* Spinner Styling */
        .spinner-border {
            border-color: currentColor;
            border-right-color: transparent;
        }
        
        .spinner-border-sm {
            width: 1rem;
            height: 1rem;
            border-width: 0.15em;
            margin-left: 8px;
            vertical-align: middle;
        }
        
        /* Button Loading State */
        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="navbar navbar-expand-lg navbar-dark mb-4">
            <div class="container-fluid">
                <a class="navbar-brand" href="{% url 'deployments:deployment_list' %}">🚀 Railway Deployment</a>
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="{% url 'deployments:deployment_list' %}">List</a>
                    <a class="nav-link" href="{% url 'deployments:deployment_form' %}">New Configuration</a>
                </div>
            </div>
        </nav>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
